version = 1

[[applications]]
id = "zsh"
name = "Zsh"
category = "shell"
packages = ["zsh"]
executables = ["zsh"]
configs = [
  { id = "zshrc", path = "~/.zshrc", description = "交互式 Shell 配置" },
  { id = "zprofile", path = "~/.zprofile", description = "登录 Shell 配置" },
  { id = "config", path = "~/.config/zsh", description = "Zsh 配置目录" },
  { id = "history", path = "~/.zsh_history", role = "history", sensitive = true, recommended = false, description = "命令历史可能包含主机、路径、参数或误输入的密钥" },
]

